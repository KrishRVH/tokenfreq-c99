name: CI

on:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [clang, clang-stronghash, gcc]
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }}
      - name: Fuzz smoke (clang only)
        if: matrix.preset == 'clang'
        run: |
          clang -std=c99 -O1 -g -fsanitize=address,undefined,fuzzer \
            -DWC_TEST_FUZZ wordcount.c wc_test.c -o wc_fuzz
          ./wc_fuzz -runs=1000

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: brew install ninja
      - name: Configure
        run: cmake --preset clang
      - name: Build
        run: cmake --build --preset clang
      - name: Test
        run: ctest --preset clang

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Debug
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure
